version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: assetflow-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: assetflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d assetflow']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
